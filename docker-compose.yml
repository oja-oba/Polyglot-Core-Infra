version: '3.8'

services:
  # --- Python Service (FastAPI) ---
  python-app:
    build:
      context: ./python-app
      dockerfile: Dockerfile
    image: polyglot-python:v1
    container_name: python-service
    ports:
      - "8000:8000"
    restart: unless-stopped

  # --- Node.js Service (Express) ---
  node-app:
    build:
      context: ./node-app
      dockerfile: Dockerfile
    image: polyglot-node:v1
    container_name: node-service
    ports:
      - "8001:8000" # Map host 8001 to container 8000
    restart: unless-stopped

  # --- Java Service (Maven + Distroless) ---
  java-app:
    build:
      context: ./java-app
      dockerfile: Dockerfile
    image: polyglot-java:v1
    container_name: java-service
    ports:
      - "8002:8000" # Map host 8002 to container 8000
    restart: unless-stopped

networks:
  default:
    name: polyglot-network